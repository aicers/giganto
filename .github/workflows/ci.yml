name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - feature_set: default
            cargo_flags: ""
          - feature_set: standalone
            cargo_flags: --no-default-features --features benchmark
          - feature_set: bootroot
            cargo_flags: --features bootroot
    steps:
      - name: Increase ulimit size
        run: ulimit -n 8096
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/checkout@v5
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.3.5
      - uses: ./.github/cache-cargo
      - name: Check formatting
        run: cargo fmt -- --check --config group_imports=StdExternalCrate
      - name: Clippy (${{ matrix.feature_set }})
        run: cargo clippy ${{ matrix.cargo_flags }} --tests -- -D warnings
      - name: Check (${{ matrix.feature_set }})
        run: cargo check ${{ matrix.cargo_flags }} --tests
      - name: Biome check
        run: biome ci
      - name: Detect Cargo.lock changes
        run: git diff-index --quiet HEAD --
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
      - name: Fetch docs theme
        run: scripts/fetch-theme.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up MkDocs
        run: python3 -m pip install --upgrade pip mkdocs-material mkdocs-static-i18n
      - name: Build Docs
        run: mkdocs build --strict
  schema:
    runs-on: ubuntu-latest
    steps:
      - name: Increase ulimit size
        run: ulimit -n 8096
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/checkout@v5
      - uses: ./.github/cache-cargo
      - name: Install libcap on Ubuntu
        run: |
          sudo apt-get install libpcap-dev libpcap0.8
      - name: Schema snapshot check
        run: cargo test --bin gen_schema graphql::tests::schema_should_be_up_to_date --no-default-features -- --ignored
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest]
        feature_set: [default, bootroot]
        include:
          - feature_set: default
            cargo_flags: ""
          - feature_set: bootroot
            cargo_flags: --features bootroot
    steps:
      - name: Increase ulimit size
        run: ulimit -n 8096
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/checkout@v5
      - uses: ./.github/cache-cargo
      - name: Install libcap on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install libpcap-dev libpcap0.8
      - name: Build (${{ matrix.feature_set }})
        run: cargo build ${{ matrix.cargo_flags }} --verbose
      - name: Run tests (${{ matrix.feature_set }})
        run: cargo test ${{ matrix.cargo_flags }} --verbose

  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature_set: [default, bootroot]
        include:
          - feature_set: default
            cargo_flags: ""
          - feature_set: bootroot
            cargo_flags: --features bootroot
    steps:
      - name: Increase ulimit size
        run: ulimit -n 8096
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/checkout@v5
      - uses: ./.github/cache-cargo
      - name: Install libcap on Ubuntu
        run: |
          sudo apt-get install libpcap-dev libpcap0.8
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate code coverage (${{ matrix.feature_set }})
        run: cargo llvm-cov ${{ matrix.cargo_flags }} --workspace --lcov --output-path lcov-${{ matrix.feature_set }}.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov-${{ matrix.feature_set }}.info
          fail_ci_if_error: true

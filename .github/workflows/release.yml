name: Release with Assets Triggered by a Tag

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "tag name"
        required: true
        default: "0.1.0"

env:
  TITLE: Giganto
  BINARY: giganto
  BOOTROOT_BINARY: giganto-bootroot
  TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  build-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}
      - name: Update to the Latest Version of Rust
        run: rustup update
      - name: Install the Tools
        run: |
          sudo apt install libpcap-dev
      - name: Build Binaries
        run: |
          RELEASE_TMP_DIR="$RUNNER_TEMP/giganto-release"
          mkdir -p "$RELEASE_TMP_DIR"

          cargo build --release
          cp "target/release/${{ env.BINARY }}" "$RELEASE_TMP_DIR/${{ env.BINARY }}"

          cargo build --release --features bootroot
          cp "target/release/${{ env.BINARY }}" "$RELEASE_TMP_DIR/${{ env.BOOTROOT_BINARY }}"
      - name: Extract release notes from CHANGELOG.md
        id: release_notes
        run: |
          RELEASE_NOTES_FILE="$RUNNER_TEMP/release_notes_temp.txt"

          # Find the section for this version in CHANGELOG.md
          VERSION="${{ env.TAG }}"
          # Look for the version heading (## [x.y.z] or ## x.y.z)
          SECTION_START=$(grep -n "^## \[$VERSION\]\|^## $VERSION" CHANGELOG.md | head -1 | cut -d: -f1)

          if [ -z "$SECTION_START" ]; then
            echo "Could not find version $VERSION in CHANGELOG.md"
            echo "release_notes=Release for version $VERSION" >> $GITHUB_OUTPUT
          else
            # Find the next version section or end of file
            NEXT_SECTION=$(tail -n +$((SECTION_START + 1)) CHANGELOG.md | grep -n "^## " | head -1 | cut -d: -f1)

            if [ -z "$NEXT_SECTION" ]; then
              # No next section, read to end of file, but skip the first line (version header)
              # Write directly to temp file to avoid shell interpretation of backticks
              tail -n +$((SECTION_START + 1)) CHANGELOG.md > "$RELEASE_NOTES_FILE"
            else
              # Read until next section, but skip the first line (version header)
              # Write directly to temp file to avoid shell interpretation of backticks
              tail -n +$((SECTION_START + 1)) CHANGELOG.md | head -n $((NEXT_SECTION - 2)) > "$RELEASE_NOTES_FILE"
            fi

            # Clean up the notes (remove empty lines at start/end) directly in the file
            sed -i '/^$/d' "$RELEASE_NOTES_FILE"
            sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' "$RELEASE_NOTES_FILE"

            # Use base64 encoding to safely pass the content through GitHub Actions
            RELEASE_NOTES_B64=$(base64 -w 0 < "$RELEASE_NOTES_FILE")
            echo "release_notes_b64=$RELEASE_NOTES_B64" >> $GITHUB_OUTPUT
          fi
      - name: Create a Release and Upload Assets
        run: |
          RELEASE_TMP_DIR="$RUNNER_TEMP/giganto-release"

          # Decode the base64-encoded release notes
          echo "${{ steps.release_notes.outputs.release_notes_b64 }}" | base64 -d > release_notes.txt
          # Read the decoded release notes
          NOTES=$(< ./release_notes.txt)
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                 --arg tag_name "${{ env.TAG }}" \
                 --arg name "${{ env.TITLE }} ${{ env.TAG }}" \
                 --arg body "$NOTES" \
                '{ tag_name: $tag_name, name: $name, body: $body }')" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -o release.json
          if [ "$(jq -r .id release.json)" == "null" ]; then
            echo "Failed to create release" >&2
            exit 1
          fi
          RELEASE_ID=$(jq -r .id release.json)

          for ASSET_NAME in "${{ env.BINARY }}" "${{ env.BOOTROOT_BINARY }}"; do
            FILE="$RELEASE_TMP_DIR/$ASSET_NAME"
            UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$ASSET_NAME"
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$FILE" \
              "${UPLOAD_URL}"
          done
